<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Torcedor Escolhe 🇧🇷</title>
  <meta name="viewport" contet="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- LOGIN -->
  <div class="login" id="login">
    <h1>🇧🇷 Torcedor Escolhe ⚽</h1>
    <input type="text" id="nome" placeholder="Digite seu nome">
    <button onclick="entrar()">Entrar</button>
  </div>

  <!-- APP -->
  <div class="container" id="app" style="display:none;">
    <h1 id="pergunta"></h1>
    <img src="img/neymar.jpg" class="neymar"> 
    <div class="buttons">
      <button class="sim" onclick="votarSim()">SIM</button>
      <button class="nao" onclick="votarNao()">NÃO</button>
    </div>
    <p id="mensagem"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
